tasks:
  task1:
    # context: default # optional; omit to use the "default" context
    description: "Optional description for task1"
    command:
      - echo ${TASKCTL__ARGS} # TASKCTL__ARGS is populated by arguments passed to task. eg. taskctl run task task1 -- arg1 arg2
      - echo {{ .Args | default 'some value' }} # .Args is populated by arguments passed to task. eg. taskctl run task task1 -- arg1 arg2
      - echo {{ index .ArgsList 0 }} # .ArgsList is populated by list of arguments passed to task. eg. taskctl run task task1 -- arg1 arg2
      - echo "My name is task1"
      - echo ${VAR_NAME_1} - ${VAR_NAME_2}
      - echo {{ .Task.Name }}
      - pwd
    env:
      VAR_NAME: VAR_VALUE
    variations:
      - VAR_NAME_1: VARIATION_1
        VAR_NAME_2: VARIATION_1
      - VAR_NAME_1: VARIATION_2
        VAR_NAME_2: VARIATION_2
    dir: "{{ .Root }}/task/working/dir" # current directory by default
    timeout: 10s
    before: mkdir some-dir
    after: rm -rf some-dir
    exportAs: TASK1_STORED_OUTPUT
    condition: git diff --exit-code

  task2:
    context: docker-context-name
    command:
      - echo "Hello from container"
      - sleep {{ .sleep }}
    env:
      VAR_NAME: VAR_VALUE
    variables:
      sleep: 10

  task3:
    context: docker-compose-context
    command:
      - echo "Hello from container created by docker-compose"
      - echo ${TASK1_STORED_OUTPUT}
    env:
      VAR_NAME: VAR_VALUE

  task4:
    context: kubernetes-context
    command:
      - echo "I'm task4"
      - env
      - uname -a

  task-to-be-triggered-by-watcher:
    command:
      - echo ${EVENT_NAME} ${EVENT_PATH}

  task-with-variations:
    command:
      - GOOS=${GOOS} GOARCH=amd64 go build -o bin/binary_${GOOS} ./...
    variations:
      - GOOS: linux
      - GOOS: darwin
      - GOOS: windows

  test-watch-task:
    command:
      - echo TASK1 $EVENT_NAME $EVENT_PATH

  test-watch-task-2:
    command:
      - echo TASK1 $EVENT_NAME $EVENT_PATH

pipelines:
  pipeline1:
    - task: task1
      dir: /tmp
      condition: git diff --exit-code

    - name: some-stage-name
      task: task2
      depends_on: task1
      allow_failure: true

    - task: task3
      depends_on: task1 # task2 and task3 will run in parallel when task1 finished
      variables:
        sleep: 30

    - task: task4
      depends_on: [task1, some-stage-name]
      env:
        VAR_NAME: VAR_VALUE # overrides task env

watchers:
  watcher1:
    watch: ["README.*", "pkg/**/*.go"]
    events: [create, write, remove, rename, chmod]
    task: task1

  test-watcher:
    events: ["write", "rename"]
    watch: ["docker-compose.yaml"]
    task: test-watch-task

  test-watcher-2:
    events: ["write", "rename", "create"]
    watch: ["*.yaml"]
    task: test-watch-task-2

  test-watcher-3:
    events: ["write", "rename", "create"]
    watch: ["*.md", "internal/**/*.go"]
    exclude: "LICENSE.md"
    task: test-watch-task-2

contexts:
  default: # used by any task that sets no context; an empty one is used if not defined
    executable:
      bin: /bin/zsh
      args:
        - -c
    env:
      VAR_NAME: VAR_VALUE
    quote: "'"
    before: echo "SOME COMMAND TO RUN BEFORE EVERY TASK"
    after: echo "SOME COMMAND TO RUN WHEN TASK FINISHED SUCCESSFULLY"

  # Escape hatch: wrap commands in any binary via executable.bin/args (type defaults to local)
  docker-context:
    executable:
      bin: /usr/local/bin/docker
      args:
        - run
        - --rm
        - alpine:latest
    env:
      DOCKER_HOST: "tcp://0.0.0.0:2375"
    before: echo "SOME COMMAND TO RUN BEFORE TASK"
    after: echo "SOME COMMAND TO RUN WHEN TASK FINISHED SUCCESSFULLY"

  docker-compose-context:
    dir: /app
    executable:
      bin: /usr/local/bin/docker-compose
      args:
        - run
        - --rm
        - api
    env:
      COMPOSE_FILE: /app/docker-compose-alternate.yaml
    up: docker-compose up -d --build --force-recreate api # Executes once before first context usage
    down: docker-compose down api # Executes once when all tasks done

  # Typed docker context, run mode: a fresh `docker run --rm` container per command
  docker-run:
    type: docker
    dir: /app # workdir inside the container
    env:
      NODE_ENV: prod # forwarded into the container via -e
    docker:
      image: node:20 # run mode; mutually exclusive with container
      host: tcp://0.0.0.0:2375 # optional docker daemon host (docker -H)
      options: [--network, host] # extra flags passed through verbatim
      shell: [sh, -c] # in-target shell, default sh -c

  # Typed docker context, exec mode: run against a container you started yourself
  docker-exec:
    type: docker
    docker:
      container: my-app # exec mode; mutually exclusive with image

  kubernetes-context:
    type: kubernetes
    kubernetes:
      pod: web-0 # required
      namespace: stage
      container: app # optional -c container within the pod
      kube_context: my-ctx # optional --context
      kubeconfig: "$HOME/.kube/alternate-config" # optional --kubeconfig
      shell: [sh, -c] # in-target shell, default sh -c

  ssh-context:
    type: ssh
    dir: /srv/app # remote workdir (cd into it before running)
    env:
      DEPLOY_ENV: prod # exported in the remote shell
    ssh:
      host: build-01 # required
      user: deploy
      port: 2222
      identity_file: ~/.ssh/id_ed25519

debug: true # debug enabled by default. To temporary disable run with "--debug=false" flag
dryrun: false # when true, validate task commands (render + parse) without executing them; valid tasks complete as "done". Also settable per-run with "--dry-run"
output: prefixed # default, prefixed, raw or json (default is the format on a TTY)
summary: true # show summary by default
