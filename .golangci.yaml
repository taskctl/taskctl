version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - contextcheck
    - copyloopvar
    - durationcheck
    - errname
    - errorlint
    - gocritic
    - intrange
    - makezero
    - misspell
    - modernize
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - revive
    - sloglint
    - thelper
    - unconvert
    - unparam
    - usestdlibvars
    - usetesting
    - wastedassign
  settings:
    revive:
      rules:
        - name: exported
  exclusions:
    rules:
      # Only the reusable core packages require doc comments on exported symbols;
      # internal/ helpers follow the repo's default-to-zero-comments convention.
      - path: ^internal/
        linters:
          - revive

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/taskctl/taskctl
