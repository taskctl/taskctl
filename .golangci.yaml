version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - contextcheck
    - copyloopvar
    - durationcheck
    - errname
    - errorlint
    - gocritic
    - intrange
    - makezero
    - misspell
    - modernize
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - revive
    - sloglint
    - thelper
    - unconvert
    - unparam
    - usestdlibvars
    - usetesting
    - wastedassign
  settings:
    revive:
      rules:
        - name: exported

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/taskctl/taskctl
